<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotesBuddy - Loading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <script defer src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script defer src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00e5a0">
  <link rel="apple-touch-icon" href="logo.png">
  <style>
    /* Splash specific */
    #screen-splash { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding-bottom: 0; }
    .splash-logo { width: 120px; margin-bottom: 24px; animation: pulse 2s infinite ease-in-out; }
    .splash-title { font-size: 40px; margin-bottom: 8px; letter-spacing: -1px; }
    .splash-tagline { font-size: 16px; color: var(--text-muted); margin-bottom: 48px; }
    .progress-container { width: 240px; height: 4px; background: var(--bg-card); border-radius: 2px; overflow: hidden; position: relative; }
    .progress-bar { height: 100%; background: var(--accent-mint); width: 0%; animation: fillProgress 3s forwards linear; box-shadow: 0 0 10px var(--accent-mint); }
    @keyframes fillProgress { to { width: 100%; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  </style>
</head>
<body>

  <div id="screen-splash">
    <img src="logo.png" alt="NotesBuddy Logo" class="splash-logo">
    <h1 class="splash-title">NotesBuddy</h1>
    <p class="splash-tagline">Your college. Your notes. All in one place.</p>
    <div class="progress-container">
      <div class="progress-bar"></div>
    </div>
    <div class="footer-text">Programmed by Shivam</div>
  </div>

  <script>
    // Redirect logic: only show splash screen on first visit
    window.onload = () => {
      if(sessionStorage.getItem('hasVisitedSplash')) {
        window.location.href = 'home.html';
      } else {
        sessionStorage.setItem('hasVisitedSplash', 'true');
        setTimeout(() => {
          window.location.href = 'home.html';
        }, 3000);
      }
    };
  </script>
</body>
</html>
