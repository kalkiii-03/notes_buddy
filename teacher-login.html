<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotesBuddy - Teacher Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00e5a0">
  <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

  <div class="container auth-container">
    <button class="btn btn-ghost" onclick="window.history.back()" style="margin-bottom: 32px;">← Back</button>
    <div class="card">
      <h1 style="margin-bottom: 8px;">Teacher Login</h1>
      <p style="margin-bottom: 24px;">Enter credentials provided by admin</p>
      
      <div id="teacher-error" class="error-msg">Invalid username or password</div>
      
      <input type="text" id="teacher-username" class="input-field" placeholder="Username">
      <div style="position: relative;">
        <input type="password" id="teacher-password" class="input-field" placeholder="Password">
        <span onclick="togglePassword('teacher-password', this)" style="position: absolute; right: 16px; top: 14px; cursor: pointer; color: var(--text-muted); font-size: 14px; font-weight: 600;">Show</span>
      </div>
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:8px;">
        <button class="btn btn-primary" style="width: 100%;" onclick="teacherLogin()">Sign In</button>
      </div>
      <div style="text-align:center; margin-top:16px;">
        <a href="admin.html" style="color:var(--text-muted); font-size:14px; text-decoration:none;">Admin Login</a>
      </div>
    </div>
  </div>
  <div class="footer-text">Programmed by Shivam</div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.onload = () => {
      if(currentTeacherUser) {
        window.location.href = 'teacher-dash.html';
      }
    };

    function teacherLogin() {
      const u = document.getElementById('teacher-username').value;
      const p = document.getElementById('teacher-password').value;
      const err = document.getElementById('teacher-error');
      
      const match = data.teachers.find(t => t.username === u && t.password === p);
      if(match) {
        localStorage.setItem('currentTeacher', match.name);
        err.style.display = 'none';
        window.location.href = 'teacher-dash.html';
      } else {
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
