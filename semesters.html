<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotesBuddy - Semesters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00e5a0">
  <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

  <div class="container">
    <nav class="navbar">
      <a href="home.html" class="nav-brand">
        <img src="logo.png" alt="Logo"> NotesBuddy
      </a>
      <div style="display:flex; gap: 12px;">
        <button class="btn btn-ghost" onclick="window.location.href='teacher-login.html'">Teacher</button>
        <button class="btn btn-primary" onclick="window.location.href='contact.html'" style="padding: 10px 16px;">Contact Me</button>
      </div>
    </nav>

    <button class="btn btn-ghost" onclick="window.history.back()" style="margin-bottom: 24px;">← Back</button>
    
    <div class="breadcrumb">
      <a href="home.html">Home</a> › <span id="bc-course-name">Course</span>
    </div>
    
    <h1 id="sem-page-title" style="margin-bottom: 8px;">Course Name</h1>
    <p>Select your semester to view subjects.</p>
    
    <div id="sem-grid" class="grid-semesters"></div>
  </div>
  <div class="footer-text">Programmed by Shivam</div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    window.onload = () => {
      renderSemesters();
    };

    function renderSemesters() {
      if(!currentCourseId) {
        window.location.href = 'home.html';
        return;
      }
      
      const course = getCourseObj(currentCourseId);
      if(!course) return;

      document.getElementById('bc-course-name').innerText = course.name;
      document.getElementById('sem-page-title').innerText = course.full;
      
      const semGrid = document.getElementById('sem-grid');
      semGrid.innerHTML = '';
      for(let i = 1; i <= course.sems; i++) {
        semGrid.innerHTML += `<a class="card sem-btn" onclick="goToSubjects(${i})">Sem ${i}</a>`;
      }
    }

    function goToSubjects(sem) {
      localStorage.setItem('currentSem', sem);
      window.location.href = 'subjects.html';
    }
  </script>
</body>
</html>
