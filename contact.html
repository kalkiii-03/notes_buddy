<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotesBuddy - Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00e5a0">
  <link rel="apple-touch-icon" href="logo.png">
</head>
<body>

  <div class="container auth-container">
    <button class="btn btn-ghost" onclick="window.history.back()" style="margin-bottom: 32px;">← Back</button>
    <h1 style="margin-bottom: 8px;">Contact</h1>
    <p style="font-size: 18px; color: var(--accent-mint); font-weight: 600; margin-bottom: 8px;">Developer - Shivam</p>
    <p style="margin-bottom: 32px;">Have a question or suggestion? Send a message.</p>
    
    <div class="card" style="margin-bottom: 24px;">
      <h3 style="margin-bottom: 8px;">Send a Message</h3>
      <p style="font-size: 14px; margin-bottom: 16px; color: var(--text-muted);">If you want to connect with me, please fill in your mobile number.</p>
      
      <input type="text" id="contact-name" class="input-field" placeholder="Your Name">
      <input type="text" id="contact-course" class="input-field" placeholder="Your Course (e.g. BCA)">
      <input type="tel" id="contact-mobile" class="input-field" placeholder="Mobile No. (Optional)">
      <textarea id="contact-message" class="input-field" placeholder="Your Message or Suggestion" rows="4"></textarea>
      
      <button class="btn btn-primary" style="width: 100%;" onclick="submitContact()">Send Message</button>
    </div>
  </div>
  <div class="footer-text">Programmed by Shivam</div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    function submitContact() {
      const n = document.getElementById('contact-name').value;
      const c = document.getElementById('contact-course').value;
      const m = document.getElementById('contact-message').value;
      
      if(!n || !c || !m) { 
        showToast("Please fill Name, Course, and Message"); 
        return; 
      }
      
      document.getElementById('contact-name').value = '';
      document.getElementById('contact-course').value = '';
      document.getElementById('contact-mobile').value = '';
      document.getElementById('contact-message').value = '';
      showToast("Message sent! I will get back to you soon.");
    }
  </script>
</body>
</html>
